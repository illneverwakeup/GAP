input:
  excel_path: "examples/example_5x12.xlsx"
  sheet_name: 0

method:
  name: "enNSGAII"
  require_each_employee_used: true
  use_repair: true
  use_penalty: true
  save_only_feasible_results: true
  resource_penalty_multiplier: 100.0
  unused_employee_penalty_multiplier: 10.0

ideal_points:
  use_bb: true
  use_cache: true
  cache_path: "ideal_points_cache.xlsx"

ga:
  pop_sizes: [50, 100, 200, 400]
  crossover_rates: [0.7, 0.8, 0.9]
  mutation_rates: [0.01, 0.02, 0.03, 0.05]
  generations: [50, 100, 200, 500]
  repeats: 20
  mutation_indpb: 0.02

random:
  seed: 42
  numpy_seed: 42

output:
  prefix: "GA_enNSGAII_local111_analysis_ready"
  directory: "results"
  write_log: true
  verbose: true
